<style>
:root{
  --bg:#ffffff;
  --surface:#f7f5f6;
  --ink:#191619;
  --ink2:#6f6569;
  --line:#e8e2e4;
  --accent:#b31b32;
  --accent-deep:#951227;
  --on-accent:#ffffff;
  --good:#1f7a55;
  --good-soft:#e7f3ed;
  --bad-soft:#faeaed;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#151216;
    --surface:#1e1a1d;
    --ink:#f3eff1;
    --ink2:#a59da2;
    --line:#2d282c;
    --accent:#f0556c;
    --accent-deep:#f4778a;
    --on-accent:#2a0b12;
    --good:#52b98a;
    --good-soft:#1c2f26;
    --bad-soft:#361b20;
  }
}
:root[data-theme="dark"]{
  --bg:#151216; --surface:#1e1a1d; --ink:#f3eff1; --ink2:#a59da2; --line:#2d282c;
  --accent:#f0556c; --accent-deep:#f4778a; --on-accent:#2a0b12;
  --good:#52b98a; --good-soft:#1c2f26; --bad-soft:#361b20;
}
:root[data-theme="light"]{
  --bg:#ffffff; --surface:#f7f5f6; --ink:#191619; --ink2:#6f6569; --line:#e8e2e4;
  --accent:#b31b32; --accent-deep:#951227; --on-accent:#ffffff;
  --good:#1f7a55; --good-soft:#e7f3ed; --bad-soft:#faeaed;
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,"SF Pro Text","Segoe UI",system-ui,Roboto,sans-serif;
  font-size:16px; line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
.serif{font-family:Georgia,"Iowan Old Style","Times New Roman",serif;}
button{font:inherit; color:inherit; background:none; border:none; padding:0; cursor:pointer;}
button:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:6px;}

#topbar{
  position:sticky; top:0; z-index:10; background:var(--bg);
  border-bottom:1px solid var(--line);
}
.tb-in{
  max-width:560px; margin:0 auto; padding:12px 16px;
  display:flex; align-items:center; gap:12px;
}
.tb-back{
  width:34px; height:34px; margin-left:-8px; flex:0 0 auto;
  display:flex; align-items:center; justify-content:center;
  border-radius:50%; color:var(--ink);
}
.tb-back:active{background:var(--surface);}
.tb-mark{
  font-family:Georgia,"Iowan Old Style","Times New Roman",serif;
  font-size:17px; letter-spacing:.01em;
}
.tb-pct{
  margin-left:auto; font-size:13px; color:var(--ink2);
  font-variant-numeric:tabular-nums;
}
#pbar{height:3px; background:var(--bg);}
#pbar > i{display:block; height:100%; background:var(--accent); width:0%; transition:width .4s ease;}

#app{max-width:560px; margin:0 auto; padding:20px 16px 64px;}

.eyebrow{
  font-size:11px; font-weight:600; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink2);
}
.eyebrow.red{color:var(--accent);}
h1{
  font-family:Georgia,"Iowan Old Style","Times New Roman",serif;
  font-size:31px; line-height:1.15; font-weight:400; margin:6px 0 10px; text-wrap:balance;
}
h2{
  font-family:Georgia,"Iowan Old Style","Times New Roman",serif;
  font-size:23px; line-height:1.2; font-weight:400; margin:0 0 6px; text-wrap:balance;
}
.lead{font-size:16.5px; color:var(--ink2); margin:0 0 8px;}
.small{font-size:13.5px; color:var(--ink2);}

.stack{display:flex; flex-direction:column; gap:14px;}
.card{
  border:1px solid var(--line); border-radius:14px; background:var(--bg);
  padding:18px;
}
.card.soft{background:var(--surface); border-color:transparent;}
.tap{width:100%; text-align:left; transition:transform .06s ease;}
.tap:active{transform:scale(.985);}

.daychips{
  font-family:Georgia,"Iowan Old Style","Times New Roman",serif;
  font-size:19px; letter-spacing:.28em; color:var(--ink2); margin-top:6px; word-break:break-all;
}
.status{font-size:13px; margin-top:8px; color:var(--ink2);}
.status b{color:var(--good); font-weight:600;}

.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  background:var(--accent); color:var(--on-accent);
  border-radius:12px; padding:13px 20px; font-weight:600; font-size:15.5px;
  width:100%; transition:background .15s ease, transform .06s ease;
}
.btn:active{background:var(--accent-deep); transform:scale(.985);}
.btn.ghost{
  background:transparent; color:var(--ink); border:1px solid var(--line);
}
.btn.ghost:active{background:var(--surface);}
.btnrow{display:flex; gap:10px; margin-top:14px;}
.btnrow .btn{flex:1;}

.tag{
  display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:.12em;
  text-transform:uppercase; padding:4px 9px; border-radius:99px;
  border:1px solid var(--line); color:var(--ink2);
}
.tag.false{background:var(--accent); border-color:var(--accent); color:var(--on-accent);}

.lcard{border:1px solid var(--line); border-radius:14px; padding:18px 18px 16px;}
.lcard .top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.glyph{
  font-family:Georgia,"Iowan Old Style","Times New Roman",serif;
  font-size:68px; line-height:1.05; margin:10px 0 2px;
}
.lname{font-size:13px; color:var(--ink2); margin-bottom:10px;}
.lname b{color:var(--ink); font-weight:600;}
.row2{
  display:grid; grid-template-columns:74px 1fr; gap:4px 12px;
  font-size:14.5px; padding:10px 0; border-top:1px solid var(--line);
}
.row2 .k{color:var(--ink2); font-size:12px; letter-spacing:.1em; text-transform:uppercase; padding-top:2px;}
.hook{font-size:14.5px; padding:10px 0; border-top:1px solid var(--line);}
.exw{
  display:flex; align-items:center; gap:12px; padding:12px 0 2px; border-top:1px solid var(--line);
}
.exw .cy{font-family:Georgia,"Iowan Old Style","Times New Roman",serif; font-size:23px;}
.exw .tr{font-size:13.5px; color:var(--ink2);}
.hist{font-size:13.5px; color:var(--ink2); margin-top:10px; padding-top:10px; border-top:1px dashed var(--line);}

.spk{
  flex:0 0 auto; width:34px; height:34px; border-radius:50%;
  display:inline-flex; align-items:center; justify-content:center;
  border:1px solid var(--line); color:var(--ink2);
}
.spk:active{background:var(--surface);}
.spk svg{width:16px; height:16px;}
html.no-audio .spk{display:none;}

.wordrow{
  width:100%; display:flex; align-items:center; gap:12px;
  padding:13px 2px; border-bottom:1px solid var(--line); text-align:left;
}
.wordrow:last-child{border-bottom:none;}
.wordrow .cy{
  font-family:Georgia,"Iowan Old Style","Times New Roman",serif;
  font-size:21px; letter-spacing:.04em; flex:1 1 auto;
}
.wordrow .ans{font-size:13.5px; color:var(--ink2); text-align:right; min-width:0;}
.wordrow .ans .hidden-hint{color:var(--ink2);}
.wordrow .ans b{color:var(--ink); font-weight:600;}

.mtable{width:100%; border-collapse:collapse; font-size:14.5px; margin:8px 0 4px;}
.mtable td{padding:7px 8px 7px 0; border-bottom:1px solid var(--line); vertical-align:top;}
.mtable tr:last-child td{border-bottom:none;}
.mtable .c1{font-family:Georgia,"Iowan Old Style","Times New Roman",serif; font-size:19px; white-space:nowrap;}
.mtable .c1 span{color:var(--ink2); font-size:14px;}
.mtable .c2{color:var(--ink2); font-size:13.5px;}

.tl{display:flex; flex-direction:column; gap:0;}
.tl-item{display:grid; grid-template-columns:64px 1fr; gap:14px; padding:13px 0; border-bottom:1px solid var(--line);}
.tl-item:last-child{border-bottom:none;}
.tl-y{
  font-family:Georgia,"Iowan Old Style","Times New Roman",serif;
  font-size:17px; color:var(--accent); font-variant-numeric:tabular-nums; line-height:1.35;
}
.tl-t{font-weight:600; font-size:15px;}
.tl-d{font-size:14px; color:var(--ink2); margin-top:2px;}

.q-meta{display:flex; justify-content:space-between; font-size:13px; color:var(--ink2); margin-bottom:10px; font-variant-numeric:tabular-nums;}
.q-prompt{font-size:18px; margin:2px 0 6px;}
.q-glyph{
  font-family:Georgia,"Iowan Old Style","Times New Roman",serif;
  font-size:58px; line-height:1.1; margin:6px 0 10px;
}
.opts{display:flex; flex-direction:column; gap:10px; margin-top:12px;}
.opt{
  border:1px solid var(--line); border-radius:12px; padding:13px 15px;
  font-size:15.5px; text-align:left; width:100%; background:var(--bg);
}
.opt .og{font-family:Georgia,"Iowan Old Style","Times New Roman",serif; font-size:22px;}
.opt:active{background:var(--surface);}
.opt.correct{border-color:var(--good); background:var(--good-soft);}
.opt.wrong{border-color:var(--accent); background:var(--bad-soft);}
.opt.dim{opacity:.45;}
.q-why{font-size:14px; color:var(--ink2); margin-top:12px; padding-top:12px; border-top:1px dashed var(--line);}
.scorebig{
  font-family:Georgia,"Iowan Old Style","Times New Roman",serif;
  font-size:52px; line-height:1.1; margin:4px 0 2px;
}

.refrow{
  display:grid; grid-template-columns:64px 1fr auto; gap:12px; align-items:center;
  padding:10px 2px; border-bottom:1px solid var(--line); font-size:13.5px;
}
.refrow:last-child{border-bottom:none;}
.refrow .g{font-family:Georgia,"Iowan Old Style","Times New Roman",serif; font-size:25px;}
.refrow .s{color:var(--ink2);}
.refhead{margin:18px 0 4px;}

.foot{margin-top:28px; text-align:center;}
.foot button{font-size:12.5px; color:var(--ink2); text-decoration:underline; text-underline-offset:3px;}

.fade{animation:fade .25s ease;}
@keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}
@media (prefers-reduced-motion: reduce){
  *{transition:none !important; animation:none !important;}
}
</style>
</head>

/* ---------------- helpers ---------------- */

function shuffle(a){
  a = a.slice();
  for(var i=a.length-1;i>0;i--){
    var j = Math.floor(Math.random()*(i+1));
    var t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}
function sample(a,n){ return shuffle(a).slice(0,n); }
function dayLetters(d){ return L.filter(function(x){return x.day===d;}); }

function progressPct(){
  var b = store.best;
  var v = (b.d1||0)+(b.d2||0)+(b.d3||0)+(b.exam||0);
  return Math.round(v/4);
}
function dayState(d){
  var key = d===4 ? "exam" : "d"+d;
  var best = store.best[key];
  var seen = dayLetters(d).length ? dayLetters(d).every(function(x){return store.seen[x.id];}) : true;
  if(best>=70) return {label:"Done. Best "+best+"%", done:true};
  if(best>0) return {label:"Best "+best+"%: hit 70% to finish", done:false};
  if(d===4) return {label:"Signs, traps and the exam", done:false};
  if(seen) return {label:"Letters read: take the quiz", done:false};
  return {label:dayLetters(d).length+" letters", done:false};
}

/* ---------------- quiz engine ---------------- */

function letterQ(letter, pool){
  var dir = Math.random()<0.5;
  if(dir){
    var wrongs = sample(pool.filter(function(x){return x.id!==letter.id && x.snd!==letter.snd;}),3)
      .map(function(x){return {t:x.snd, ok:false};});
    var opts = shuffle(wrongs.concat([{t:letter.snd, ok:true}]));
    return {prompt:"What does this letter say?", glyph:letter.ch+" "+letter.lo, opts:opts,
      why:letter.ch+" "+letter.lo+": "+letter.snd+". "+letter.like};
  }else{
    var wrongs2 = sample(pool.filter(function(x){return x.id!==letter.id && x.snd!==letter.snd;}),3)
      .map(function(x){return {t:x.ch+" "+x.lo, g:true, ok:false};});
    var opts2 = shuffle(wrongs2.concat([{t:letter.ch+" "+letter.lo, g:true, ok:true}]));
    return {prompt:"Which letter says: "+letter.snd+"?", glyph:null, opts:opts2,
      why:letter.ch+" "+letter.lo+": "+letter.snd+". "+letter.like};
  }
}
function decodeQ(d){
  var opts = shuffle(d.o.map(function(t,i){return {t:t, ok:i===d.a};}));
  return {prompt:"Read it:", glyph:d.c, opts:opts, why:d.why, decode:true};
}
function startDayQuiz(day){
  var pool = L.filter(function(x){return x.day<=day;});
  var letters = sample(dayLetters(day), 5);
  var qs = letters.map(function(l){return letterQ(l, pool);})
    .concat(sample(DECODE[day], 5).map(decodeQ));
  quiz = {kind:"day", day:day, qs:shuffle(qs), i:0, score:0, ans:null, done:false};
  location.hash = "#/quiz/"+day;
}
function startExam(){
  var qs = sample(L,12).map(function(l){return letterQ(l, L);});
  var allDec = DECODE[1].concat(DECODE[2], DECODE[3], DECODE.exam);
  qs = qs.concat(sample(allDec, 8).map(decodeQ));
  quiz = {kind:"exam", day:4, qs:shuffle(qs), i:0, score:0, ans:null, done:false};
  location.hash = "#/exam";
}
function answer(i){
  if(!quiz || quiz.ans!==null) return;
  quiz.ans = i;
  if(quiz.qs[quiz.i].opts[i].ok) quiz.score++;
  render();
}
function nextQ(){
  if(!quiz) return;
  if(quiz.i < quiz.qs.length-1){ quiz.i++; quiz.ans=null; render(); window.scrollTo(0,0); }
  else{
    quiz.done = true;
    var pct = Math.round(100*quiz.score/quiz.qs.length);
    var key = quiz.kind==="exam" ? "exam" : "d"+quiz.day;
    if(!store.best[key] || pct>store.best[key]) store.best[key]=pct;
    save(); render(); window.scrollTo(0,0);
  }
}

      +'<tr><td class="c1">Ðœ <span>â†’ M</span></td><td class="c2">same letter, same sound</td></tr>'

      +'<p style="font-size:14.5px; margin:8px 0 4px">Say it: <b>mask-VA</b>. Not MOS-cow.</p>'
      +'<p class="small" style="margin:0">Why two names? English borrowed the city\'s older name, Moskov, centuries ago, filtered through German Moskau and French Moscou. Russian moved on to ÐœÐ¾ÑÐºÐ²Ð°, which is also the name of the river the city sits on. '
      + spkBtn("ÐœÐ¾ÑÐºÐ²Ð°","Hear Moscow") +'</p>'
      +'</div>';
  }

  if(PAYOFF[d]){
    h += '<div class="card">'
      +'<p class="eyebrow red">Now you can read</p>'
      +'<p class="small" style="margin:6px 0 4px">Real words, only today\'s letters and earlier. Say each one out loud, then tap to check.</p>';

    h += '<button class="btn" onclick="startDayQuiz('+d+')">Take the Day '+d+' quiz</button>';

      +'</div>';
    h += '<div class="card">'
      +'<p class="eyebrow red">Rule 2: the y-team</p>'
      +'<h2>Ð• Ð Ð® Ð¯ carry a built-in y</h2>'
      +'<p style="font-size:14.5px; margin:6px 0 0">ye, yo, yoo, ya. After a consonant the y mostly melts into it and softens it: Ð½ÐµÑ‚ comes out nyet. Ð­ exists precisely to write a plain e with no y.</p>'
      +'</div>';
    h += '<div class="card">'
      +'<p class="eyebrow red">Rule 3: the italic traps</p>'

      +'<tr><td class="c1">Ð¿ <span>â†’</span> <i>Ð¿</i></td><td class="c2">can look like an n</td></tr>'

function vSigns(){
  var h = '<div class="fade">'
    +'<p class="eyebrow red">Day 4</p>'
    +'<h1>The sign decoder</h1>'
    +'<p class="lead">25 signs you would actually meet. Read each aloud before you tap. Aim for a clean sweep.</p>'
    +'<div class="card" style="margin-top:14px">';
  SIGNS.forEach(function(w,i){ h += wordRow(w, "sg"+i); });
  h += '</div>'
    +'<div class="btnrow"><button class="btn" onclick="startExam()">The final exam</button></div>'
    +'</div>';
  return h;
}

function vRef(){
  var groups = [
    {t:"Old friends", g:"same"},
    {t:"False friends", g:"false"},
    {t:"New shapes, familiar sounds", g:"new"},
    {t:"New sounds", g:"newsnd"}
  ];
  var h = '<div class="fade">'
    +'<p class="eyebrow red">Reference</p>'
    +'<h1>All 33 letters</h1>'
    +'<button class="btn ghost" style="margin:10px 0 4px" onclick="sayAlphabet()">Hear the whole alphabet</button>';
  groups.forEach(function(gr){
    h += '<p class="eyebrow refhead">'+gr.t+'</p><div class="card">';
    L.filter(function(x){return x.grp===gr.g;}).forEach(function(l){
      h += '<div class="refrow"><span class="g">'+l.ch+" "+l.lo+'</span>'
        +'<span class="s">'+l.snd+'</span>'+spkBtn(l.say,"Hear it")+'</div>';
    });
    h += '</div>';
  });
  h += '</div>';
  return h;
}
function sayAlphabet(){
  say(L.map(function(l){return l.say;}).join(", "));
}

function vQuiz(){
  if(!quiz) { location.hash="#/"; return ""; }
  if(quiz.done){
    var pct = Math.round(100*quiz.score/quiz.qs.length);
    var msg = pct>=90 ? "Excellent. Move on with confidence."
      : pct>=70 ? "Solid. That is a pass: this day is done."
      : "Not yet. Run it again: repetition is the entire trick.";
    return '<div class="fade" style="text-align:center; padding-top:20px">'
      +'<p class="eyebrow red">'+(quiz.kind==="exam"?"Final exam":"Day "+quiz.day+" quiz")+'</p>'
      +'<div class="scorebig">'+quiz.score+' / '+quiz.qs.length+'</div>'
      +'<p class="lead" style="margin-top:6px">'+msg+'</p>'
      +'<div class="btnrow" style="max-width:340px; margin:20px auto 0">'
      +(quiz.kind==="exam"
        ? '<button class="btn ghost" onclick="startExam()">Retake</button><button class="btn" onclick="location.hash=\'#/\'">Home</button>'
        : '<button class="btn ghost" onclick="startDayQuiz('+quiz.day+')">Retake</button><button class="btn" onclick="location.hash=\'#/\'">Home</button>')
      +'</div></div>';
  }
  var q = quiz.qs[quiz.i];
  var h = '<div class="fade">'
    +'<div class="q-meta"><span>'+(quiz.kind==="exam"?"Final exam":"Day "+quiz.day+" quiz")+'</span>'
    +'<span>'+(quiz.i+1)+' / '+quiz.qs.length+'</span></div>'
    +'<div class="card">'
    +'<p class="q-prompt">'+q.prompt+'</p>'
    +(q.glyph?'<div class="q-glyph">'+q.glyph+'</div>':"")
    +'<div class="opts">';
  q.opts.forEach(function(o,i){
    var cls = "opt";
    if(quiz.ans!==null){
      if(o.ok) cls += " correct";
      else if(i===quiz.ans) cls += " wrong";
      else cls += " dim";
    }
    h += '<button class="'+cls+'" onclick="answer('+i+')">'
      +(o.g?'<span class="og">'+o.t+'</span>':o.t)+'</button>';
  });
  h += '</div>';
  if(quiz.ans!==null){ h += '<div class="q-why">'+q.why+'</div>'; }
  h += '</div>';
  if(quiz.ans!==null){
    h += '<button class="btn" style="margin-top:14px" onclick="nextQ()">'
      +(quiz.i===quiz.qs.length-1?"Finish":"Next")+'</button>';
  }
  h += '</div>';
  return h;
}

/* ---------------- router ---------------- */

function resetAll(){
  store = {seen:{}, best:{}}; save(); render();
}

function goBack(){
  var hash = location.hash || "#/";
  if(hash.indexOf("#/quiz/")===0 && quiz){ location.hash = "#/day/"+quiz.day; return; }
  if(hash.indexOf("#/day/")===0 || hash==="#/history" || hash==="#/ref" || hash==="#/exam"){ location.hash="#/"; return; }
  if(hash==="#/signs"){ location.hash="#/day/4"; return; }
  location.hash = "#/";
}

function render(){
  var hash = location.hash || "#/";
  var app = document.getElementById("app");
  var back = document.getElementById("backbtn");
  var html = "";
  if(hash==="#/" || hash==="#"){ html = vHome(); back.style.display="none"; }
  else{
    back.style.display="flex";
    if(hash==="#/history") html = vHistory();
    else if(hash.indexOf("#/day/")===0){
      var d = parseInt(hash.slice(6),10);
      html = (d>=1&&d<=4) ? vDay(d) : vHome();
    }
    else if(hash.indexOf("#/quiz/")===0 || hash==="#/exam"){
      if(!quiz){ location.hash="#/"; return; }
      html = vQuiz();
    }
    else if(hash==="#/signs") html = vSigns();
    else if(hash==="#/ref") html = vRef();
    else { html = vHome(); back.style.display="none"; }
  }
  app.innerHTML = html;
  /* stash reveal data after innerHTML so attributes survive quoting */
  hydrateRows();
  var pct = progressPct();
  document.getElementById("tbpct").textContent = pct>0 ? pct+"%" : "";
  document.getElementById("pfill").style.width = pct+"%";
}

/* wordRow answers are injected via data attributes to avoid quote headaches */
var ROWDATA = {};
function hydrateRows(){
  Object.keys(ROWDATA).forEach(function(id){
    var el = document.getElementById(id+"-a");
    if(el){ el.setAttribute("data-t", ROWDATA[id].t); el.setAttribute("data-e", ROWDATA[id].e); }
  });
}
/* register row data */
(function(){
  [1,2,3].forEach(function(d){
    PAYOFF[d].forEach(function(w,i){ ROWDATA["pf"+d+"_"+i] = w; });
  });
  SIGNS.forEach(function(w,i){ ROWDATA["sg"+i] = w; });
})();

window.addEventListener("hashchange", function(){ render(); window.scrollTo(0,0); });
render();
</script>

<script>
(function(){
  var SITE='marcusjball';
  var EP='https://central-2-mcp-production.up.railway.app/public/analytics';
  var sid;
  try{ sid=localStorage.getItem('mjb_sid'); if(!sid){ sid='s_'+Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem('mjb_sid',sid);} }catch(e){ sid=''; }
  function send(ev,d){ try{ var b=JSON.stringify(Object.assign({site:SITE,event:ev,page:(location.pathname+location.hash).slice(0,300),session_id:sid,referrer:(document.referrer||'').slice(0,300)},d||{}));
    if(navigator.sendBeacon){ navigator.sendBeacon(EP,new Blob([b],{type:'text/plain'})); } else { fetch(EP,{method:'POST',headers:{'Content-Type':'text/plain'},body:b,keepalive:true}); } }catch(e){} }
  send('pageview',{});
  window.addEventListener('hashchange',function(){ send('pageview',{}); });
  window.addEventListener('popstate',function(){ send('pageview',{}); });
  try{ var _ps=history.pushState; history.pushState=function(){ _ps.apply(this,arguments); try{ send('pageview',{}); }catch(e){} }; }catch(e){}
  document.addEventListener('click',function(e){ var el=e.target&&e.target.closest?e.target.closest('a,button,[role=button],[data-track]'):null; if(!el) return;
    var label=(el.getAttribute('aria-label')||el.getAttribute('data-track')||(el.textContent||'').trim()||el.tagName||'').replace(/\s+/g,' ').slice(0,140);
    var href=el.getAttribute('href')||''; send('click',{label:label,href:href}); },true);
  function vids(){ var vs=document.querySelectorAll('video'); for(var i=0;i<vs.length;i++){ (function(v){ if(v.__mjb) return; v.__mjb=1;
    v.addEventListener('play',function(){ send('video_play',{label:(v.getAttribute('src')||v.currentSrc||'video').slice(0,140)}); });
    v.addEventListener('ended',function(){ send('video_complete',{label:(v.getAttribute('src')||v.currentSrc||'video').slice(0,140)}); }); })(vs[i]); } }
  vids(); document.addEventListener('DOMContentLoaded',vids);
  try{ new MutationObserver(vids).observe(document.documentElement,{childList:true,subtree:true}); }catch(e){}
})();
</script>
